plugins {
    id 'java'
    id("io.qameta.allure") version "3.0.2"
}

group = 'Kiselev_George'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation platform('org.junit:junit-bom:5.10.0')
    implementation 'org.junit.jupiter:junit-jupiter'
    implementation 'org.seleniumhq.selenium:selenium-java:4.40.0'
    implementation 'org.assertj:assertj-core:3.27.7'
    implementation 'io.qameta.allure:allure-junit5:2.32.0'
    implementation 'com.codeborne:selenide:7.14.0'
    implementation 'org.aeonbits.owner:owner:1.0.12'
}

test {
    useJUnitPlatform()
}